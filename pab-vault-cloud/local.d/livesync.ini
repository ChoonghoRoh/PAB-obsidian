; Obsidian Self-hosted LiveSync 권장 CouchDB 설정
; /opt/couchdb/etc/local.d/ 에 마운트 → 부팅 시 자동 로드, 영속 적용
; (LiveSync 공식 setup 권장값)

[couchdb]
single_node = true
max_document_size = 50000000

[chttpd]
max_http_request_size = 4294967296
enable_cors = true
; /_up 만 인증 면제 → docker healthcheck(curl /_up) 통과 + 나머지 엔드포인트는 인증 유지
require_valid_user_except_for_up = true

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
headers = accept, authorization, content-type, origin, referer
methods = GET, PUT, POST, HEAD, DELETE
max_age = 3600
